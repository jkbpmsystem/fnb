<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Import Tool — JKB</title>
<style>
  :root {
    --bg: #050a12;
    --card: rgba(10,20,35,0.82);
    --text: #e8f4ff;
    --subtext: rgba(160,200,240,0.65);
    --border: rgba(0,180,255,0.25);
    --primary: #00c8ff;
    --hover: rgba(0,160,255,0.12);
    --input-bg: rgba(0,30,60,0.6);
    --glow: rgba(0,180,255,0.28);
    --success: #16a34a;
    --danger: #dc2626;
    --warning: #f59e0b;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* TOPBAR */
  .app-topbar {
    background: var(--primary);
    color: #fff;
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 52px;
    flex-shrink: 0;
  }
  .app-topbar-left { display:flex; align-items:center; gap:14px; }
  .app-topbar-logo {
    height:34px; width:34px; border-radius:6px;
    background:#fff; display:flex; align-items:center; justify-content:center;
    font-weight:700; color:var(--primary); font-size:13px;
  }
  .app-topbar-title { font-size:13px; font-weight:600; }
  .app-topbar-sub { font-size:11px; opacity:.7; }

  /* MAIN */
  .container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .import-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px 32px;
    width: 100%;
    max-width: 560px;
    backdrop-filter: blur(6px);
  }

  .import-card h2 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .import-card .sub {
    font-size: 13px;
    color: var(--subtext);
    margin-bottom: 28px;
  }

  /* STEPS */
  .step {
    margin-bottom: 22px;
    padding: 16px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: rgba(0,30,60,0.25);
  }

  .step-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .step-num {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--primary);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700;
    flex-shrink: 0;
  }

  .step-num.done { background: var(--success); }
  .step-num.error { background: var(--danger); }

  .step-title { font-size: 14px; font-weight: 600; }

  /* CONFIG */
  .config-row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }

  .config-row label {
    font-size: 12px;
    color: var(--subtext);
    display: block;
    margin-bottom: 4px;
  }

  .config-row .field { flex: 1; }

  .config-row input,
  .config-row select {
    width: 100%;
    padding: 9px 12px;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px;
    outline: none;
  }

  .config-row input:focus,
  .config-row select:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 2px var(--glow);
  }

  /* FILE DROP */
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 28px;
    text-align: center;
    cursor: pointer;
    transition: 0.2s;
  }

  .drop-zone:hover,
  .drop-zone.dragover {
    border-color: var(--primary);
    background: var(--hover);
  }

  .drop-zone .icon { font-size: 32px; margin-bottom: 8px; }
  .drop-zone .label { font-size: 14px; color: var(--subtext); }
  .drop-zone .label b { color: var(--primary); }

  .file-info {
    margin-top: 10px;
    font-size: 13px;
    color: var(--success);
    display: none;
  }

  /* BUTTON */
  .btn-import {
    width: 100%;
    padding: 13px;
    margin-top: 8px;
    border: none;
    border-radius: 10px;
    background: var(--primary);
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.2s;
    letter-spacing: 0.3px;
  }

  .btn-import:hover { opacity: 0.9; box-shadow: 0 0 20px var(--glow); }
  .btn-import:disabled { opacity: 0.4; cursor: not-allowed; }

  /* PROGRESS */
  .progress-wrap {
    margin-top: 16px;
    display: none;
  }

  .progress-bar-bg {
    width: 100%;
    height: 8px;
    background: rgba(0,60,120,0.3);
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    width: 0%;
    background: var(--primary);
    border-radius: 4px;
    transition: width 0.3s;
  }

  .progress-bar-fill.success { background: var(--success); }
  .progress-bar-fill.error { background: var(--danger); }

  .progress-text {
    margin-top: 8px;
    font-size: 13px;
    color: var(--subtext);
  }

  /* LOG */
  .log-box {
    margin-top: 16px;
    max-height: 200px;
    overflow-y: auto;
    font-size: 12px;
    font-family: 'Consolas', 'Courier New', monospace;
    background: rgba(0,10,20,0.5);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    display: none;
  }

  .log-box .log-line { margin-bottom: 3px; }
  .log-box .log-ok { color: #4ade80; }
  .log-box .log-err { color: #f87171; }
  .log-box .log-info { color: var(--subtext); }

  /* RESULT */
  .result-box {
    margin-top: 16px;
    padding: 14px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    display: none;
    text-align: center;
  }

  .result-box.success {
    background: rgba(22,163,74,0.15);
    border: 1px solid rgba(22,163,74,0.3);
    color: #4ade80;
  }

  .result-box.error {
    background: rgba(220,38,38,0.15);
    border: 1px solid rgba(220,38,38,0.3);
    color: #f87171;
  }

  .back-link {
    display: block;
    text-align: center;
    margin-top: 20px;
    color: var(--subtext);
    font-size: 13px;
    text-decoration: none;
  }
  .back-link:hover { color: var(--primary); }

  input[type="file"] { display: none; }
</style>
</head>
<body>

  <!-- TOPBAR -->
  <div class="app-topbar">
    <div class="app-topbar-left">
      <div class="app-topbar-logo">JKB</div>
      <div>
        <div class="app-topbar-title">Import Tool</div>
        <div class="app-topbar-sub">Hospital Sultan Zainal Abidin - UniSZA</div>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="container">
    <div class="import-card">
      <h2>📥 Import Assets ke Firestore</h2>
      <p class="sub">Upload fail JSON dan import terus ke Firebase database anda.</p>

      <!-- STEP 1: CONFIG -->
      <div class="step" id="step1">
        <div class="step-header">
          <div class="step-num" id="step1num">1</div>
          <div class="step-title">Firebase Config & Module</div>
        </div>
        <div class="config-row">
          <div class="field">
            <label>Module</label>
            <select id="moduleSelect">
              <option value="FEMS">FEMS — Facility Engineering</option>
              <option value="BEMS">BEMS — Biomedical Engineering</option>
            </select>
          </div>
        </div>
        <div class="config-row">
          <div class="field">
            <label>API Key</label>
            <input type="text" id="cfgApiKey" placeholder="AIzaSy...">
          </div>
        </div>
        <div class="config-row">
          <div class="field">
            <label>Project ID</label>
            <input type="text" id="cfgProjectId" placeholder="my-project-id">
          </div>
          <div class="field">
            <label>Auth Domain</label>
            <input type="text" id="cfgAuthDomain" placeholder="my-project.firebaseapp.com">
          </div>
        </div>
        <div class="config-row">
          <div class="field">
            <label>Email (Firebase Auth)</label>
            <input type="text" id="cfgEmail" placeholder="admin@hospital.com">
          </div>
          <div class="field">
            <label>Password</label>
            <input type="password" id="cfgPassword" placeholder="••••••••">
          </div>
        </div>
      </div>

      <!-- STEP 2: FILE -->
      <div class="step" id="step2">
        <div class="step-header">
          <div class="step-num" id="step2num">2</div>
          <div class="step-title">Upload JSON File</div>
        </div>
        <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
          <div class="icon">📄</div>
          <div class="label">Klik atau drag fail <b>.json</b> ke sini</div>
        </div>
        <input type="file" id="fileInput" accept=".json">
        <div class="file-info" id="fileInfo"></div>
      </div>

      <!-- STEP 3: IMPORT -->
      <div class="step" id="step3">
        <div class="step-header">
          <div class="step-num" id="step3num">3</div>
          <div class="step-title">Import ke Firestore</div>
        </div>
        <button class="btn-import" id="btnImport" disabled onclick="startImport()">Import Sekarang</button>
        <div class="progress-wrap" id="progressWrap">
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressFill"></div>
          </div>
          <div class="progress-text" id="progressText">Sedia...</div>
        </div>
        <div class="log-box" id="logBox"></div>
        <div class="result-box" id="resultBox"></div>
      </div>

      <a href="dashboard.html" class="back-link">← Kembali ke Dashboard</a>
    </div>
  </div>

<script type="module">
  // =====================
  // FIREBASE SDK (ESM)
  // =====================
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js';
  import { getAuth, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js';
  import { getFirestore, writeBatch, doc, serverTimestamp, setDoc } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js';

  let parsedAssets = [];
  let firebaseApp = null;
  let db = null;
  let auth = null;

  // =====================
  // FILE HANDLING
  // =====================
  const fileInput = document.getElementById('fileInput');
  const dropZone = document.getElementById('dropZone');
  const fileInfo = document.getElementById('fileInfo');
  const btnImport = document.getElementById('btnImport');

  fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

  dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('dragover');
  });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
  });

  function handleFile(file) {
    if (!file) return;
    if (!file.name.endsWith('.json')) {
      alert('Sila upload fail .json sahaja');
      return;
    }

    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (!Array.isArray(data)) {
          alert('JSON mesti dalam format array [ {...}, {...} ]');
          return;
        }
        parsedAssets = data;
        fileInfo.style.display = 'block';
        fileInfo.textContent = `✅ ${file.name} — ${data.length} asset dijumpai`;
        dropZone.querySelector('.label').innerHTML = `<b>${file.name}</b> (${data.length} records)`;
        document.getElementById('step2num').classList.add('done');
        checkReady();
      } catch (err) {
        alert('JSON tidak sah: ' + err.message);
      }
    };
    reader.readAsText(file);
  }

  function checkReady() {
    const apiKey = document.getElementById('cfgApiKey').value.trim();
    const projectId = document.getElementById('cfgProjectId').value.trim();
    const email = document.getElementById('cfgEmail').value.trim();
    const password = document.getElementById('cfgPassword').value.trim();

    btnImport.disabled = !(apiKey && projectId && email && password && parsedAssets.length > 0);
  }

  // Listen config changes
  document.querySelectorAll('#step1 input, #step1 select').forEach(el => {
    el.addEventListener('input', checkReady);
  });

  // Auto-fill authDomain
  document.getElementById('cfgProjectId').addEventListener('input', function() {
    const authDomain = document.getElementById('cfgAuthDomain');
    if (!authDomain.value || authDomain.value.endsWith('.firebaseapp.com')) {
      authDomain.value = this.value.trim() + '.firebaseapp.com';
    }
  });

  // =====================
  // IMPORT LOGIC
  // =====================
  window.startImport = async function() {
    const apiKey = document.getElementById('cfgApiKey').value.trim();
    const projectId = document.getElementById('cfgProjectId').value.trim();
    const authDomain = document.getElementById('cfgAuthDomain').value.trim() || (projectId + '.firebaseapp.com');
    const email = document.getElementById('cfgEmail').value.trim();
    const password = document.getElementById('cfgPassword').value.trim();
    const module = document.getElementById('moduleSelect').value;
    const moduleKey = module.toLowerCase();

    const progressWrap = document.getElementById('progressWrap');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    const logBox = document.getElementById('logBox');
    const resultBox = document.getElementById('resultBox');

    // Reset UI
    progressWrap.style.display = 'block';
    logBox.style.display = 'block';
    logBox.innerHTML = '';
    resultBox.style.display = 'none';
    progressFill.style.width = '0%';
    progressFill.className = 'progress-bar-fill';
    btnImport.disabled = true;
    btnImport.textContent = 'Importing...';

    function log(msg, type) {
      const cls = type === 'ok' ? 'log-ok' : type === 'err' ? 'log-err' : 'log-info';
      logBox.innerHTML += `<div class="log-line ${cls}">${msg}</div>`;
      logBox.scrollTop = logBox.scrollHeight;
    }

    try {
      // 1) Init Firebase
      log('🔌 Connecting ke Firebase...', 'info');
      firebaseApp = initializeApp({
        apiKey, authDomain, projectId,
        storageBucket: projectId + '.firebasestorage.app',
      });
      auth = getAuth(firebaseApp);
      db = getFirestore(firebaseApp);
      document.getElementById('step1num').classList.add('done');
      log('✅ Firebase initialized', 'ok');

      // 2) Login
      log(`🔐 Login sebagai ${email}...`, 'info');
      await signInWithEmailAndPassword(auth, email, password);
      log('✅ Login berjaya', 'ok');

      // 3) Import in batches
      const total = parsedAssets.length;
      const batchSize = 200;
      let imported = 0;
      let errors = 0;

      log(`📦 Mula import ${total} asset ke modules/${moduleKey}/assets/`, 'info');

      for (let i = 0; i < total; i += batchSize) {
        const chunk = parsedAssets.slice(i, i + batchSize);
        const batch = writeBatch(db);

        chunk.forEach((asset) => {
          const assetId = String(asset.id || `${module}-IMPORT-${i + 1}`);
          const ref = doc(db, 'modules', moduleKey, 'assets', assetId);
          batch.set(ref, {
            ...asset,
            module: module,
            importedAt: serverTimestamp(),
            updatedAt: serverTimestamp()
          }, { merge: true });
        });

        try {
          await batch.commit();
          imported += chunk.length;
          const pct = Math.round((imported / total) * 100);
          progressFill.style.width = pct + '%';
          progressText.textContent = `${imported} / ${total} (${pct}%)`;
          log(`  ✅ Batch ${Math.floor(i/batchSize)+1}: ${chunk.length} asset imported (${imported}/${total})`, 'ok');
        } catch (batchErr) {
          errors += chunk.length;
          log(`  ❌ Batch ${Math.floor(i/batchSize)+1} gagal: ${batchErr.message}`, 'err');
        }
      }

      // 4) Update counter
      log(`🔢 Updating counter → counters/${moduleKey}_asset = ${total}`, 'info');
      try {
        const counterRef = doc(db, 'counters', `${moduleKey}_asset`);
        await setDoc(counterRef, {
          value: total,
          module: module,
          updatedAt: serverTimestamp()
        }, { merge: true });
        log('✅ Counter updated', 'ok');
      } catch (cErr) {
        log('⚠️ Counter update gagal (anda boleh update manual): ' + cErr.message, 'err');
      }

      // 5) Result
      document.getElementById('step3num').classList.add('done');
      progressFill.classList.add('success');

      if (errors === 0) {
        resultBox.className = 'result-box success';
        resultBox.textContent = `🎉 Berjaya! ${imported} asset telah di-import ke Firestore.`;
      } else {
        resultBox.className = 'result-box error';
        resultBox.textContent = `⚠️ Selesai dengan masalah: ${imported} berjaya, ${errors} gagal.`;
        progressFill.classList.add('error');
      }
      resultBox.style.display = 'block';

    } catch (err) {
      log('❌ Error: ' + err.message, 'err');
      progressFill.classList.add('error');
      progressFill.style.width = '100%';
      resultBox.className = 'result-box error';
      resultBox.textContent = '❌ Import gagal: ' + err.message;
      resultBox.style.display = 'block';

      if (err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password') {
        log('💡 Tip: Semak email dan password Firebase Auth anda.', 'info');
      }
      if (err.code === 'auth/user-not-found') {
        log('💡 Tip: User ini belum wujud dalam Firebase Auth.', 'info');
      }
    } finally {
      btnImport.disabled = false;
      btnImport.textContent = 'Import Sekarang';
    }
  };
</script>
<script src="js/firebase-config.local.js"></script>
</body>
</html>
