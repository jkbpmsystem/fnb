<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Update Post Warranty PPM</title>
<link rel="stylesheet" href="css/style.css">
<style>
  .filter-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-bar select, .filter-bar input {
    padding: 8px 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    background: #fff;
    min-width: 160px;
  }
  .filter-bar button {
    padding: 8px 18px;
    background: #f59e0b;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
  }
  .filter-bar button:hover { background: #d97706; }

  .ppm-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  .ppm-table th {
    background: #fff7ed;
    padding: 10px 12px;
    text-align: left;
    font-weight: 600;
    color: #374151;
    border-bottom: 2px solid #fed7aa;
  }
  .ppm-table td {
    padding: 10px 12px;
    border-bottom: 1px solid #f0f0f0;
    color: #374151;
  }
  .ppm-table tr:hover { background: #fffbeb; }

  /* Status colors */
  .ppm-table tr.done td { background: #f0fdf4; }
  .ppm-table tr.warning td { background: #fffbeb; }
  .ppm-table tr.danger td { background: #fef2f2; }

  .badge {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }
  .badge.done { background: #dcfce7; color: #16a34a; }
  .badge.pending { background: #fef9c3; color: #ca8a04; }
  .badge.overdue { background: #fee2e2; color: #dc2626; }

  .btn-edit {
    padding: 5px 14px;
    background: #f59e0b;
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  .btn-edit:hover { background: #d97706; }
  .btn-edit.done-btn {
    background: #e5e7eb;
    color: #6b7280;
  }
  .btn-edit.done-btn:hover { background: #d1d5db; }

  /* Modal */
  #editModal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 9999;
    justify-content: center;
    align-items: center;
  }
  .edit-modal-box {
    background: #fff;
    padding: 28px;
    border-radius: 14px;
    min-width: 340px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  }
  .edit-modal-box h3 {
    margin: 0 0 6px;
    font-size: 17px;
    color: #1e293b;
  }
  .edit-modal-box .sub {
    font-size: 13px;
    color: #64748b;
    margin-bottom: 18px;
  }
  .edit-modal-box label {
    font-size: 13px;
    font-weight: 600;
    color: #374151;
    display: block;
    margin-bottom: 6px;
  }
  .edit-modal-box input[type="date"] {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 14px;
    box-sizing: border-box;
  }
  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 20px;
  }
  .modal-actions button {
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    border: none;
  }
  .btn-cancel { background: #f1f5f9; color: #374151; }
  .btn-cancel:hover { background: #e2e8f0; }
  .btn-save { background: #f59e0b; color: #fff; }
  .btn-save:hover { background: #d97706; }

  .table-wrapper {
    overflow-x: auto;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.07);
    padding: 0;
  }

  .result-count {
    font-size: 13px;
    color: #64748b;
    margin-bottom: 10px;
  }

  .no-data {
    text-align: center;
    padding: 40px;
    color: #9ca3af;
    font-size: 15px;
  }

  .page-header-badge {
    display: inline-block;
    padding: 4px 12px;
    background: #fff7ed;
    color: #c2410c;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    margin-left: 10px;
    border: 1px solid #fed7aa;
  }
</style>
</head>
<body onload="checkAuth()">
<div class="wrapper">

<!-- LOADER -->
<div id="globalLoader" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.3);display:none;align-items:center;justify-content:center;z-index:9999;">
  <div style="background:#fff;padding:20px;border-radius:10px;">Loading...</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo"></div>
  <a href="dashboard.html" class="side-item">Dashboard</a>
  <a href="asset-master.html" class="side-item">Assets</a>
  <a href="preventive-maintenance.html" class="side-item">PPM</a>
  <a href="update-ppm.html" class="side-item">Update During</a>
  <a href="update-post.html" class="side-item active">Update Post</a>
</div>

<div class="main">
  <div class="topbar">
    <div class="title">Update Post Warranty <span class="page-header-badge">🟠 Post Warranty Only</span></div>
    <button class="btn" onclick="toggleTheme()">🌙</button>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <select id="filterMonth" onchange="applyFilter()">
      <option value="">-- All Months --</option>
    </select>
    <select id="filterVendor" onchange="applyFilter()">
      <option value="">-- All Vendors --</option>
    </select>
    <select id="filterStatus" onchange="applyFilter()">
      <option value="">-- All Status --</option>
      <option value="pending">Pending</option>
      <option value="done">Done</option>
      <option value="overdue">Overdue</option>
    </select>
    <button onclick="resetFilter()">Reset</button>
  </div>

  <div class="result-count" id="resultCount"></div>

  <div class="table-wrapper">
    <table class="ppm-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Equipment</th>
          <th>Location</th>
          <th>Vendor</th>
          <th>Frequency</th>
          <th>Cycle</th>
          <th>Planned Date</th>
          <th>Actual Date</th>
          <th>Left Days</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="ppmTableBody">
        <tr><td colspan="10" class="no-data">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- EDIT MODAL -->
<div id="editModal">
  <div class="edit-modal-box">
    <h3 id="editModalTitle">Update Post Warranty PPM</h3>
    <div class="sub" id="editModalSub"></div>
    <label>Actual Date:</label>
    <input type="date" id="editActualDate">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
      <button class="btn-save" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<!-- ASSET DETAIL MODAL -->
<div class="modal" id="globalDetailModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="detailTitle">Asset Detail</h3>
      <span class="close-btn">&times;</span>
    </div>
    <div id="detailBody"></div>
  </div>
</div>

</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/modal.js"></script>
<script src="js/toggletheme"></script>
<script>

let allRows = [];
let selectedEdit = null;

// ==========================
// INIT
// ==========================
async function initUpdatePost(){
  // 🔥 TUKAR: guna getPostWarrantyAPI (bukan getAssets)
  const data = await getPostWarrantyAPI();
  allRows = buildRows(data);
  populateFilters(allRows);
  renderTable(allRows);
}

document.addEventListener("DOMContentLoaded", initUpdatePost);

// ==========================
// BUILD FLAT ROWS
// Data dari backend:
// [{ id, equipment, location, vendor, frequency, PostDate, endContract,
//    ppmDates: [{cycle, cycleLabel, planned, actual}] }]
// ==========================
function buildRows(data){
  const rows = [];

  (data || []).forEach(asset => {
    const cycles = asset.ppmDates || [];

    cycles.forEach(c => {
      if(!c.planned) return;

      const today = new Date();
      today.setHours(0,0,0,0);
      const due = new Date(c.planned);
      const diff = Math.ceil((due - today) / (1000*60*60*24));

      let status = "pending";
      if(c.actual) status = "done";
      else if(diff < 0) status = "overdue";

      rows.push({
        id: asset.id,
        equipment: asset.equipment || "-",
        location: asset.location || "-",
        vendor: asset.vendor || "-",
        frequency: asset.frequency || "-",
        cycle: c.cycle,
        cycleLabel: c.cycleLabel,
        planned: c.planned,
        actual: c.actual,
        leftDays: diff,
        status: status
      });
    });
  });

  return rows;
}

// ==========================
// POPULATE FILTERS
// ==========================
function populateFilters(rows){

  // months
  const months = [...new Set(rows.map(r => {
    const d = new Date(r.planned);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
  }))].sort();

  const monthSel = document.getElementById("filterMonth");
  months.forEach(m => {
    const [y, mo] = m.split("-");
    const label = new Date(y, mo-1).toLocaleString("default",{month:"long", year:"numeric"});
    monthSel.innerHTML += `<option value="${m}">${label}</option>`;
  });

  // vendors
  const vendors = [...new Set(rows.map(r => r.vendor).filter(v => v && v !== "-"))].sort();
  const vendorSel = document.getElementById("filterVendor");
  vendors.forEach(v => {
    vendorSel.innerHTML += `<option value="${v}">${v}</option>`;
  });
}

// ==========================
// APPLY FILTER
// ==========================
function applyFilter(){
  const month = document.getElementById("filterMonth").value;
  const vendor = document.getElementById("filterVendor").value;
  const status = document.getElementById("filterStatus").value;

  let filtered = allRows;

  if(month){
    filtered = filtered.filter(r => {
      const d = new Date(r.planned);
      const m = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
      return m === month;
    });
  }

  if(vendor){
    filtered = filtered.filter(r => r.vendor === vendor);
  }

  if(status){
    filtered = filtered.filter(r => r.status === status);
  }

  renderTable(filtered);
}

function resetFilter(){
  document.getElementById("filterMonth").value = "";
  document.getElementById("filterVendor").value = "";
  document.getElementById("filterStatus").value = "";
  renderTable(allRows);
}

// ==========================
// RENDER TABLE
// ==========================
function renderTable(rows){
  const tbody = document.getElementById("ppmTableBody");
  const count = document.getElementById("resultCount");

  count.textContent = `Showing ${rows.length} Post Warranty record(s)`;

  if(rows.length === 0){
    tbody.innerHTML = `<tr><td colspan="11" class="no-data">No post warranty PPM found</td></tr>`;
    return;
  }

  tbody.innerHTML = rows.map(r => {

    const rowClass = r.status === "done" ? "done" : r.status === "overdue" ? "danger" : r.leftDays <= 30 ? "warning" : "";
    const badgeClass = r.status === "done" ? "done" : r.status === "overdue" ? "overdue" : "pending";
    const badgeLabel = r.status === "done" ? "Done" : r.status === "overdue" ? "Overdue" : "Pending";
    const leftDaysDisplay = r.actual ? "-" : r.leftDays + " days";
    const btnClass = r.status === "done" ? "btn-edit done-btn" : "btn-edit";
    const btnLabel = r.status === "done" ? "✏️ Edit" : "✏️ Update";

    return `
      <tr class="${rowClass}">
        <td class="clickable" 
  onclick="event.stopPropagation(); onClickId('${r.id}')" 
  style="cursor:pointer;color:#2563eb;text-decoration:underline;">
  ${r.id}
        </td>
        <td>${r.equipment}</td>
        <td>${r.location}</td>
        <td>${r.vendor}</td>
        <td>${r.frequency}</td>
        <td>${r.cycleLabel}</td>
        <td>${formatDateLocal(r.planned)}</td>
        <td>${r.actual ? formatDateLocal(r.actual) : "-"}</td>
        <td>${leftDaysDisplay}</td>
        <td><span class="badge ${badgeClass}">${badgeLabel}</span></td>
        <td>
          <button class="${btnClass}"
            data-id="${r.id}"
            data-cycle="${r.cycle}"
            data-cyclelabel="${r.cycleLabel}"
            data-actual="${r.actual || ""}"
            onclick="openEditModal(this)">
            ${btnLabel}
          </button>
        </td>
      </tr>
    `;

  }).join("");

}

// ==========================
// FORMAT DATE
// ==========================
function formatDateLocal(dateStr){
  if(!dateStr) return "-";
  const d = new Date(dateStr);
  if(isNaN(d)) return "-";
  return d.toLocaleDateString("en-GB");
}

// ==========================
// OPEN ASSET DETAIL
// ==========================
function onClickId(id){
  if(typeof openAssetDetailById === "function"){
    openAssetDetailById(id);
  }else{
    console.error("❌ openAssetDetailById not found");
  }
}

// ==========================
// OPEN EDIT MODAL
// ==========================
function openEditModal(btn){
  const id         = btn.dataset.id;
  const cycle      = parseInt(btn.dataset.cycle);
  const cycleLabel = btn.dataset.cyclelabel;
  const actual     = btn.dataset.actual || "";
  const equipment  = btn.closest("tr").querySelector("td:nth-child(2)").textContent;

  selectedEdit = { id, cycle, cycleLabel };

  document.getElementById("editModalTitle").textContent = `Update Post Warranty — Cycle ${cycleLabel}`;
  document.getElementById("editModalSub").textContent = equipment;
  document.getElementById("editActualDate").value = actual
    ? new Date(actual).toISOString().split("T")[0]
    : "";

  document.getElementById("editModal").style.display = "flex";
}

function closeEditModal(){
  const saveBtn = document.querySelector(".btn-save");
  if(saveBtn){
    saveBtn.disabled = false;
    saveBtn.textContent = "Save";
    saveBtn.style.opacity = "1";
    saveBtn.style.cursor = "pointer";
  }

  document.getElementById("editModal").style.display = "none";
  selectedEdit = null;
}

// ==========================
// SAVE EDIT
// ==========================
async function saveEdit(){
  if(!selectedEdit){ alert("No PPM selected"); return; }

  const date = document.getElementById("editActualDate").value;
  if(!date){ alert("Please select date"); return; }

  const today = new Date();
  today.setHours(0,0,0,0);
  if(new Date(date) > today){ alert("Tak boleh isi future date"); return; }

  const saveBtn = document.querySelector(".btn-save");
  saveBtn.disabled = true;
  saveBtn.textContent = "Saving...";
  saveBtn.style.opacity = "0.5";
  saveBtn.style.cursor = "not-allowed";

  // 🔥 TUKAR: guna updatePostAPI (bukan updatePPMAPI)
  const res = await updatePostAPI(selectedEdit.id, selectedEdit.cycle, date);

  if(res?.success){
    const row = allRows.find(r => r.id === selectedEdit.id && r.cycle === selectedEdit.cycle);
    if(row){
      row.actual = date;
      row.status = "done";
    }
    closeEditModal();
    applyFilter();
    alert("Saved ✅");
  }else{
    saveBtn.disabled = false;
    saveBtn.textContent = "Save";
    saveBtn.style.opacity = "1";
    saveBtn.style.cursor = "pointer";
    alert("Failed ❌ : " + (res?.error || res?.status || "Unknown"));
  }
}

</script>

</body>
</html>
