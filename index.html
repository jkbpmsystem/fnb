
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="globalLoader" style="
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.3);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
">
  <div style="background:#fff;padding:20px;border-radius:10px;">
    Loading...
  </div>
</div>

<div class="main" style="max-width:420px;margin:60px auto;">
  <h2 class="title">CMMS Login</h2>
  <div class="asset-card" style="margin-top:16px;">
    <input id="usernam" placeholder="Username"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>
    <button id="loginBtn" onclick="login()">Login</button>

<div id="loginLoader" style="display:none;">
  <div class="spinner"></div>
</div>
  </div>
</div>
<script src="js/api.js"></script>
<script>
async function login(){

  const btn = document.getElementById("loginBtn");
  const loader = document.getElementById("loginLoader");

  // 🔥 SHOW LOADING
  btn.disabled = true;
  loader.style.display = "block";

  try{

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    const res = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "login",
        username,
        password
      })
    });

    const text = await res.text();
    const data = JSON.parse(text);

    console.log("LOGIN RESULT:", data);

  }catch(err){
    console.error("LOGIN ERROR:", err);
  }

  // 🔥 HIDE LOADING
  btn.disabled = false;
  loader.style.display = "none";
}
</script>
</body>
</html>
