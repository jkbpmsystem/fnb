
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="globalLoader" style="
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.3);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
">
  <div style="background:#fff;padding:20px;border-radius:10px;">
    Loading...
  </div>
</div>

<div class="main" style="max-width:420px;margin:60px auto;">
  <h2 class="title">CMMS Login</h2>
  <div class="asset-card" style="margin-top:16px;">
    <input id="user" placeholder="Username"><br><br>
    <input id="pass" type="password" placeholder="Password"><br><br>
    <button class="btn btn-primary" onclick="login()">Login</button>
  </div>
</div>
<script src="js/api.js"></script>
<script>
async function login(){
  const res = await fetch(API.ASSET,{
    method:"POST",
    body: JSON.stringify({action:"login", username:user.value, password:pass.value})
  });
  const d = await res.json();
  if(d.status==="success"){
    sessionStorage.setItem("cmmsUser", user.value);
    window.location.href = "module.html";
  }else{
    alert("Invalid login");
  }
}
</script>
</body>
</html>
