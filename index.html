<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="test1/components/index.css">
<link rel="stylesheet" href="test1/components/loading.css">
<link rel="icon" type="image/png" href="test1/img/cube.png">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<script src="test1/components/loading.js"></script>
<script src="test1/components/index.js"></script> 

</head>

<body>

<div id="loadingScreen">

  <div class="loader-box">

    <div class="cube">
      <i class="fa-solid fa-cube"></i>
    </div>

    <div class="loading-text">
      Loading ...
    </div>

    <div class="loading-bar">
      <div class="bar"></div>
    </div>

  </div>

</div>

<canvas id="particleCanvas"></canvas>

<div class="container">

  <div class="left">
    <h1></h1>
    <p>
      
    </p>
  </div>

  <div class="right">
    <div class="login-card">

      <div class="logo">
        <i class="fa-solid fa-cube"></i> JKB
      </div>

      <div class="input-group">
        <label>Username</label>
        <div class="input-box">
          <input type="text" id="loginUsername" placeholder="Enter your username">
          <i class="fa-solid fa-envelope"></i>
        </div>
      </div>

      <div class="input-group">
        <label>Password</label>
        <div class="input-box">
          <input type="password" id="loginPass" placeholder="Enter your password">
          <i class="fa-solid fa-lock"></i>
        </div>
      </div>

      <button class="login-btn" onclick="login()">Login</button>
      

      <div class="footer">© 2026 F&B System</div>

    </div>
  </div>

</div>



</body>

</html>
