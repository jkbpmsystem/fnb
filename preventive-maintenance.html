<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PPM</title>
<link rel="stylesheet" href="test1/components/loading.css">
<link rel="stylesheet" href="test1/components/pm.css">
<link rel="icon" type="image/png" href="test1/img/cube.png">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">

<script src="test1/components/loading.js"></script>
<script src="test1/components/pm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

</head>

<body>

<div id="loadingScreen">

  <div class="loader-box">

    <div class="cube">
      <i class="fa-solid fa-cube"></i>
    </div>

    <div class="loading-text">
      Loading ...
    </div>

    <div class="loading-bar">
      <div class="bar"></div>
    </div>

  </div>

</div>
  
<div class="wrapper">

 <!-- Sidebar -->
<div class="sidebar">
  <div class="logo"><i class="fa-solid fa-cube"></i></div>

<a href="dashboard.html" class="side-item">
  <i class="fa-solid fa-house"></i>
  <span>Dashboard</span>
</a>

  <a href="asset-master.html" class="side-item">
    <i class="fa-solid fa-box"></i>
    <span>Assets</span>
  </a>

  <a href="warranty.html" class="side-item">
    <i class="fa-solid fa-shield-halved"></i>
    <span>Warranty</span>
  </a>

  <a href="preventive-maintenance.html" class="side-item">
    <i class="fa-solid fa-calendar-days"></i>
    <span>PPM</span>
  </a>

  <a href="statutory.html" class="side-item">
    <i class="fa-solid fa-clipboard-list"></i>
    <span>Statutory</span>
  </a>
</div>

  <!-- Main -->
  <div class="main">

    <div class="topbar">
      <div class="title">PM Warranty</div>
          </div>

    <div class="header-row">
      <h2>Preventive Maintenance</h2>
      <div class="actions">
  <button class="btn" onclick="exportMonth()">Export</button>
</div>
    </div>

    <!-- Calendar -->
 <div class="calendar-wrapper">

  <div class="calendar-nav">
    <button onclick="prevMonth()">◀</button>
    <h2 id="monthYear"></h2>
    <button onclick="nextMonth()">▶</button>
  </div>

  <div class="calendar-header">
    <span>S</span>
    <span>M</span>
    <span>T</span>
    <span>W</span>
    <span>T</span>
    <span>F</span>
    <span>S</span>
  </div>

  <div id="calendarGrid" class="calendar-grid"></div>

</div>
 
    <!-- Upcoming -->
    <div class="table-box">
      <div class="table-title">Upcoming PMs</div>
      <div id="upcomingPM"></div>
    </div>



<div id="eventModal" class="modal">
  <div class="modal-box">

    <div class="modal-header">
      <h3 id="modalTitle">PPM</h3>
      <span class="close-btn" onclick="closeModal()">
        <i class="fa-solid fa-xmark"></i>
      </span>
    </div>

    <div id="modalContent"></div>

  </div>
</div>
  
  <div id="tooltip" class="tooltip"></div>
  
</body>
</html>
