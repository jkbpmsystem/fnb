
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PPM</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body onload="checkAuth()">
<div class="wrapper">

<div id="globalLoader" style="
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.3);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
">
  <div style="background:#fff;padding:20px;border-radius:10px;">
    Loading...
  </div>
</div>
  
<div class="sidebar">
  <div class="logo"></div>
  <a href="dashboard.html" class="side-item ">Dashboard</a>
  <a href="asset-master.html" class="side-item ">Assets</a>
  <a href="preventive-maintenance.html" class="side-item active">PPM</a>
  <a href="update-ppm.html" class="side-item active">Update Date PPM</a>
</div>

  <div class="main">
    <div class="topbar">
      <div class="title">Preventive Maintenance</div>
      <button class="btn" onclick="toggleTheme()">🌙</button>
    </div>

<div class="toggle-group">
  <button id="btnDuring" onclick="showDuring()">Post Warranty</button>
  <button id="btnPost" onclick="showPost()">During Warranty</button>
  <a href="update-ppm.html" class="side-item active">Update Date PPM</a>
</div>

<div id="calendarGrid"></div>

<!-- MODAL -->
<div id="monthModal" class="modal">
  <div class="modal-content">
    <span onclick="closeMonthModal()">✖</span>

    <table id="monthTable">
      <thead>
        <tr>
          <th>ID</th>
          <th>Equipment</th>
          <th>Location</th>
          <th>Vendor</th>
          <th>Cycle</th>
          <th>Date</th>
          <th>Left Days</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

  </div>
</div>


<div class="modal" id="globalDetailModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="detailTitle">Asset Detail</h3>
      <span class="close-btn">&times;</span>
    </div>
    <div id="detailBody"></div>
  </div>
</div>


    
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/modal.js"></script>
<script src="js/ppm.js"></script>
<script src="js/toggletheme"></script>
</body>
</html>
