
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PPM</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body onload="checkAuth()">
<div class="wrapper">

<div id="globalLoader" style="
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.3);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
">
  <div style="background:#fff;padding:20px;border-radius:10px;">
    Loading...
  </div>
</div>
  
<div class="sidebar">
  <div class="logo">■</div>
  <a href="dashboard.html" class="side-item ">Dashboard</a>
  <a href="asset-master.html" class="side-item ">Assets</a>
  <a href="preventive-maintenance.html" class="side-item active">PPM</a>
</div>

  <div class="main">
    <div class="topbar">
      <div class="title">Preventive Maintenance</div>
    </div>

    <div class="calendar-wrapper">
      <div class="calendar-nav">
        <button class="btn" onclick="prevMonth()">◀</button>
        <h3 id="monthYear"></h3>
        <button class="btn" onclick="nextMonth()">▶</button>
      </div>
      <div id="calendarGrid" class="calendar-grid"></div>
    </div>
  </div>
</div>


<div class="modal" id="globalDetailModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="detailTitle">Asset Detail</h3>
      <span class="close-btn">&times;</span>
    </div>
    <div id="detailBody"></div>
  </div>
</div>


<script src="js/api.js"></script>
