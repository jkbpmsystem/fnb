<!DOCTYPE html>
<html> 
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asset Master</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/loader.css">
</head>
<body onload="checkAuth()">

<!-- GLOBAL LOADER -->
<div id="globalLoader">
  <div></div>
</div>

<div class="wrapper">

  <!-- TOPBAR HEADER -->
  <div class="app-topbar">
    <div class="app-topbar-left">
      <div class="app-topbar-logo">JKB</div>
      <div class="app-topbar-info">
        <div class="app-topbar-title">Monitoring Assets</div>
        <div class="app-topbar-sub">Hospital Sultan Zainal Abidin - UniSZA</div>
      </div>
    </div>
    <div class="app-topbar-right">
      <div class="app-topbar-date" id="topbarDate"></div>
    </div>
  </div>

  <!-- CONTENT AREA: SIDEBAR + MAIN -->
  <div class="content-area">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-label">Menu</div>
      <a href="dashboard.html" class="side-item">
        <span class="nav-icon">📊</span> Dashboard
      </a>
      <a href="asset-master.html" class="side-item active">
        <span class="nav-icon">📦</span> Assets
      </a>
      <a href="update-ppm.html" class="side-item">
        <span class="nav-icon">🔧</span> During Warranty
      </a>
      <a href="update-post.html" class="side-item">
        <span class="nav-icon">🛠️</span> Post Warranty
      </a>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">
      <div class="topbar">
        <div class="title">Assets</div>
        <div class="actions">
          <input id="searchBox" placeholder="Search...">
          <button class="btn btn-primary" onclick="openAddAsset()">+ Add Asset</button>
        </div>
      </div>

      <div class="table-box">
        <table id="assetTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>Asset No</th>
              <th>Location</th>
              <th>Equipment</th>
              <th>Type Code</th>
              <th>Discipline</th>
              <th>Start</th>
              <th>End</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
        <div id="pagination" style="margin-top:10px;display:flex;gap:6px;"></div>
      </div>
    </div>

  </div>
</div>

<!-- MODAL: ASSET DETAIL -->
<div class="modal" id="globalDetailModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="detailTitle">Asset Detail</h3>
      <span class="close-btn">&times;</span>
    </div>
    <div id="detailBody"></div>
  </div>
</div>

<!-- MODAL: PPM UPDATE -->
<div id="ppmModal" class="modal" style="display:none;">
  <div class="modal-content" style="max-width:400px;">
    <h3>Update PPM</h3>
    <div style="margin:10px 0;">
      <label>Actual Date</label>
      <input type="date" id="ppmActualDate" style="width:100%; padding:8px;">
    </div>
    <div style="display:flex; gap:10px; justify-content:flex-end;">
      <button class="btn" onclick="closePPMModal()">Cancel</button>
      <button class="btn btn-primary" onclick="savePPM()">Save</button>
    </div>
  </div>
</div>

<!-- SCRIPTS -->
<script>
(function() {
  var t = new Date();
  var el = document.getElementById('topbarDate');
  if (el) {
    el.textContent = t.toLocaleDateString('ms-MY', {
      weekday: 'long',
      year: 'numeric',
      month: 'long',
      day: 'numeric'
    });
  }
})();
</script>
<script src="js/firebase-config.local.js"></script>
<script src="js/firebase-init.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/location.js"></script>
<script src="js/modal.js"></script>
<script src="js/asset.js"></script>
<script src="js/toggletheme"></script>
</body>
</html>
