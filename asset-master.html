<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Master</title>
    <link rel="stylesheet" href="test1/components/loading.css">
    <link rel="stylesheet" href="test1/components/asset.css">
    <link rel="icon" type="image/png" href="test1/img/cube.png">
   
    <!-- FONT AWESOME -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <script src="test1/components/loading.js"></script>
    <script src="test1/components/asset.js"></script>
    <script src="test1/components/location-data.js" defer></script>
    
</head>
  
<body>

<div id="loadingScreen">

  <div class="loader-box">

    <div class="cube">
      <i class="fa-solid fa-cube"></i>
    </div>

    <div class="loading-text">
      Loading ...
    </div>

    <div class="loading-bar">
      <div class="bar"></div>
    </div>

  </div>

</div>
    
    <div class="wrapper">

        <!-- Sidebar -->
        <div class="sidebar">
  <div class="logo"><i class="fa-solid fa-cube"></i></div>

<a href="dashboard.html" class="side-item">
  <i class="fa-solid fa-house"></i>
  <span>Dashboard</span>
</a>

  <a href="asset-master.html" class="side-item">
    <i class="fa-solid fa-box"></i>
    <span>Assets</span>
  </a>

  <a href="warranty.html" class="side-item">
    <i class="fa-solid fa-shield-halved"></i>
    <span>Warranty</span>
  </a>

  <a href="preventive-maintenance.html" class="side-item">
    <i class="fa-solid fa-calendar-days"></i>
    <span>PPM</span>
  </a>

  <a href="statutory.html" class="side-item">
    <i class="fa-solid fa-clipboard-list"></i>
    <span>Statutory</span>
  </a>
</div>
        <!-- Main -->
        <div class="main">

            <div class="topbar">
                <div class="title">Master</div>
            </div>

            <div class="container">

                <!-- ACTION BAR -->
                <div class="card action-bar" style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;">
                    <button class="btn" onclick="openModal()">Add Asset</button>

                   <input type="text" id="searchBox" placeholder="Search..." onkeyup="searchTable()">

                    <select id="filterDiscipline" onchange="filterTable()">
                        <option value="">All Discipline</option>
                    </select>

                    <select id="filterLocation" onchange="filterTable()">
                        <option value="">All Location</option>
                    </select>
                </div>

                <!-- TABLE -->
                <div class="card">
                    <table id="assetTable">
                        <thead>
                            <tr>
                                <th></th>
                                <th>ID</th>
                                <th>Asset No</th>
                                <th>Equipment Name</th>
                                <th>Type Code</th>
                                <th>Equipment Descriptions</th>
                                <th>Discipline</th>
                                <th>Code Location</th>
                                <th>Start Date</th>
                                <th>End Date</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px">

                    <div id="assetTotal" style="font-size:13px;opacity:0.7;"></div>

                    <div id="pagination" style="display:flex;gap:6px;"></div>

</div>
                    
                </div>


            </div>
        </div>

        
        
        <div class="modal" id="assetModal">

            <div class="modal-content">

                <div class="modal-header">
                    <h3>Add Asset</h3>
                    <span class="close-btn" onclick="closeModal()">&times;</span>
                </div>

                <div class="modal-body">

                    <div class="form-grid">

                        <div class="form-group">
                            <label>ID</label>
                            <input type="text" id="assetId" readonly>
                        </div>

                        <div class="form-group">
                            <label>Code Location</label>
                            <input type="text"
                                id="codeLocation"
                                placeholder="L1-BEM-001"
                                oninput="checkLocation(); this.value=this.value.toUpperCase();">
                        </div>

                        <div class="form-group">
                            <label>Area</label>
                            <input type="text" id="area" readonly>
                        </div>

                        <div class="form-group">
                            <label>Department</label>
                            <input type="text" id="department" readonly>
                        </div>

                        <div class="form-group">
                            <label>Asset No</label>
                            <input id="assetNo" type="text" placeholder="Enter manufacturer"required>
                        </div>

                        <div class="form-group">
                            <label>Asset No Hosza</label>
                            <input id="assetNoHosza" type="text" placeholder="Enter model"required>
                        </div>

                        <div class="form-group">
                            <label>Equipment Name</label>
                            <input id="equipmentName" type="text" placeholder="Enter serial number"required>
                        </div>
                        <div class="form-group">
                            <label>Type Code</label>
                            <input id="typeCode"
                                   type="text"
                                    placeholder="Enter Type Code"
                                   oninput="autoFillEquipmentDesc()"
                                   required>
                        </div>

                        <div class="form-group">
                            <label>Equipment Descriptions</label>
                            <input type="text" id="equipmentDescriptions" readonly>
                        </div>

                      <div class="form-group">
                            <label>Discipline</label>

                            <select id="discipline" required>
                                    <option value="">Select Discipline</option>
                                    <option value="Mechanical">MECHANICAL</option>
                                    <option value="Electrical">ELECTRICAL</option>
                            </select>

                        </div>

                        <div class="form-group">
                            <label>Bumi</label>
                            <input id="bumi" type="text" placeholder="Enter Bumi"required>
                        </div>

                        <div class="form-group">
                            <label>Bumi Contact</label>
                            <input id="bumiContact" type="text" placeholder="Enter Bumi Contact"required>
                        </div>

                        <div class="form-group">
                            <label>Supplier</label>
                            <input id="supplier" type="text" placeholder="Enter Supplier"required>
                        </div>

                        <div class="form-group">
                            <label>Supplier Contact</label>
                            <input id="supplierContact" type="text" placeholder="Enter Supplier Contact"required>
                        </div>

                        <div class="form-group">
                            <label>Manufacture</label>
                            <input id="manufacture" type="text" placeholder="Enter Manufacture"required>
                        </div>

                        <div class="form-group">
                            <label>Model</label>
                            <input id="model" type="text" placeholder="Enter Model"required>
                        </div>

                        <div class="form-group">
                            <label>Serial Number</label>
                            <input id="serialNumber" type="text" placeholder="Enter Serial Number"required>
                        </div>

                        <div class="form-group">
                            <label>Price</label>
                            <input id="price" type="text" placeholder="Enter Price"required>
                        </div>

                        <div class="form-group">
                            <label>LPO No</label>
                            <input id="lpoNo"type="text" placeholder="Enter LPO No"required>
                        </div>

                        <div class="form-group">
                            <label>Category</label>
                            <input id="category" type="text" placeholder="ASSET or INVENTORY"required>
                        </div>

                        <div class="form-group">
                            <label>Start Date</label>
                            <input id="startDate" type="date"required>
                        </div>

                        <div class="form-group">
                            <label>End Date</label>
                            <input id="endDate" type="date"required>
                        </div>

                       <div class="form-group">
                            <label>Frequency PPM by Vendor *base on T&C*</label>
                            <input id="ppmFrequency" type="text" placeholder="Enter Frequency"required>
                        </div>

                       <div class="form-group">
                            <label>Asset dalam kontrak Edgenta?</label>

                            <select id="status" required>
                                    <option value="">Select</option>
                                    <option value="NO">NO</option>
                                    <option value="YES">YES</option>
                            </select>

                        </div>

                    </div>

                    <button class="save-btn" onclick="saveAsset()">Save Asset</button>

                </div>

            </div>

        </div>

<div id="globalModal" class="modal">
  <div class="modal-content">

    <div class="modal-header">
      <h3 id="modalTitle">Detail</h3>
      <span class="close-btn" data-close>&times;</span>
    </div>

    <div id="modalDetail"></div>

  </div>
</div>
</body>


</html>
