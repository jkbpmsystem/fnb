
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Asset Master</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body onload="checkAuth()">
<div class="wrapper">
  
<div class="sidebar">
  <div class="logo">■</div>
  <a href="dashboard.html" class="side-item ">Dashboard</a>
  <a href="asset-master.html" class="side-item active">Assets</a>
  <a href="preventive-maintenance.html" class="side-item ">PPM</a>
</div>

  <div class="main">
    <div class="topbar">
      <div class="title">Assets</div>
      <div class="actions">
        <input id="searchBox" placeholder="Search...">
        <button class="btn btn-primary" onclick="openAddAsset()">Add Asset</button>
      </div>
    </div>

    <div class="table-box">
      <table id="assetTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Asset No</th>
            <th>Equipment</th>
            <th>Type</th>
            <th>Discipline</th>
            <th>Location</th>
            <th>Start</th>
            <th>End</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <div id="pagination" style="margin-top:10px;display:flex;gap:6px;"></div>
    </div>
  </div>
</div>


<div class="modal" id="globalDetailModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="detailTitle">Asset Detail</h3>
      <span class="close-btn">&times;</span>
    </div>
    <div id="detailBody"></div>
  </div>
</div>


<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/location.js"></script>
<script src="js/modal.js"></script>
<script src="js/asset.js"></script>
</body>
</html>
