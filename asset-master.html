
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Asset Master</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/loader.css">
</head>
<body onload="checkAuth()">
<div class="wrapper">
  
<div id="globalLoader" style="
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(5,10,18,0.85);
  backdrop-filter:blur(8px);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
">
  <div style="
    width:48px;
    height:48px;
    border-radius:50%;
    border:3px solid rgba(0,180,255,0.25);
    border-top-color:#00c8ff;
    animation:spin 0.8s linear infinite;
    box-shadow:0 0 18px rgba(0,180,255,0.28);
  "></div>
</div>

  
  <div class="sidebar">
  <div class="logo"></div>
  <a href="dashboard.html" class="side-item ">Dashboard</a>
  <a href="asset-master.html" class="side-item active">Assets</a>
  <a href="preventive-maintenance.html" class="side-item ">PPM</a>
</div>

  <div class="main">
    <div class="topbar">
      <div class="title">Assets</div>
      <div class="actions">
        <input id="searchBox" placeholder="Search...">
        <button class="btn btn-primary" onclick="openAddAsset()">Add Asset</button>
        <button class="btn" onclick="toggleTheme()">🌙</button>
      </div>
    </div>

    <div class="table-box">
      <table id="assetTable">
       <thead>
  <tr>
    <th>ID</th>
    <th>Asset No</th>
    <th>Location</th>
    <th>Equipment</th>
    <th>Type Code</th>
    <th>Discipline</th>
    <th>Start</th>
    <th>End</th>
  </tr>
</thead>
        <tbody></tbody>
      </table>
      <div id="pagination" style="margin-top:10px;display:flex;gap:6px;"></div>
    </div>
  </div>
</div>


<div class="modal" id="globalDetailModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="detailTitle">Asset Detail</h3>
      <span class="close-btn">&times;</span>
    </div>
    <div id="detailBody"></div>
  </div>
</div>

  <div id="ppmModal" class="modal" style="display:none;">
  <div class="modal-content" style="max-width:400px;">
    <h3>Update PPM</h3>

    <div style="margin:10px 0;">
      <label>Actual Date</label>
      <input type="date" id="ppmActualDate" style="width:100%; padding:8px;">
    </div>

    <div style="display:flex; gap:10px; justify-content:flex-end;">
      <button onclick="closePPMModal()">Cancel</button>
      <button onclick="savePPM()">Save</button>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/location.js"></script>
<script src="js/modal.js"></script>
<script src="js/asset.js"></script>
<script src="js/toggletheme"></script>
</body>
</html>
