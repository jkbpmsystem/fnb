<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asset Master</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/loader.css">
<style>
/* ========================================
   LAYOUT BARU — Topbar + Sidebar lebar
   (override style.css yang asal)
   ======================================== */

/* -- Wrapper: tukar dari flex row ke flex column -- */
.wrapper {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ========================================
   TOPBAR HEADER (baru)
   ======================================== */
.app-topbar {
  background: var(--primary);
  color: #fff;
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 52px;
  flex-shrink: 0;
  z-index: 100;
}

.app-topbar-left {
  display: flex;
  align-items: center;
  gap: 14px;
}

.app-topbar-logo {
  height: 34px;
  width: 34px;
  border-radius: 6px;
  background: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  color: var(--primary);
  font-size: 13px;
  flex-shrink: 0;
}

.app-topbar-info .app-topbar-title {
  font-size: 13px;
  font-weight: 600;
  line-height: 1.3;
}

.app-topbar-info .app-topbar-sub {
  font-size: 11px;
  opacity: .7;
  line-height: 1.3;
}

.app-topbar-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.app-topbar-date {
  font-size: 11px;
  opacity: .75;
}

.app-topbar .btn-theme {
  padding: 5px 10px;
  font-size: 14px;
  border: 1px solid rgba(255,255,255,.25);
  background: rgba(255,255,255,.1);
  color: #fff;
  border-radius: 8px;
  cursor: pointer;
  transition: background .2s;
}

.app-topbar .btn-theme:hover {
  background: rgba(255,255,255,.2);
}

/* ========================================
   CONTENT AREA (sidebar + main)
   ======================================== */
.content-area {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ========================================
   SIDEBAR — override jadi lebar + horizontal text
   ======================================== */
.sidebar {
  width: 220px;
  background: var(--card);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: stretch;
  padding: 20px 0;
  overflow-y: auto;
  flex-shrink: 0;
}

.sidebar .logo {
  display: none;
}

.sidebar-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .1em;
  color: var(--subtext);
  text-transform: uppercase;
  padding: 0 16px;
  margin-bottom: 6px;
}

.side-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  margin: 1px 8px;
  border-radius: 8px;
  font-size: 13px;
  color: var(--subtext);
  text-decoration: none;
  cursor: pointer;
  transition: background .15s, color .15s;
  flex-direction: row;
  width: auto;
}

.side-item:hover {
  background: var(--hover);
  color: var(--text);
}

.side-item.active {
  background: var(--primary);
  color: #fff;
}

.side-item .nav-icon {
  width: 20px;
  text-align: center;
  flex-shrink: 0;
  font-size: 15px;
}

.sidebar-divider {
  height: 1px;
  background: var(--border);
  margin: 12px 16px;
}

/* ========================================
   MAIN — override
   ======================================== */
.main {
  flex: 1;
  padding: 24px 32px;
  overflow: auto;
}

/* ========================================
   SEARCH INPUT styling
   ======================================== */
#searchBox {
  padding: 8px 14px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: 13px;
  outline: none;
  min-width: 200px;
}

#searchBox:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 2px rgba(37, 99, 235, .15);
}

/* ========================================
   GLOBAL LOADER — override
   ======================================== */
#globalLoader {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(5, 10, 18, 0.85);
  backdrop-filter: blur(8px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

#globalLoader > div {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: 3px solid rgba(37, 99, 235, 0.25);
  border-top-color: var(--primary);
  animation: spin 0.8s linear infinite;
  box-shadow: 0 0 18px rgba(37, 99, 235, 0.28);
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ========================================
   RESPONSIVE
   ======================================== */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .main { padding: 16px; }
  .topbar { flex-direction: column; align-items: stretch; }
  #searchBox { min-width: 100%; }
  .app-topbar-info .app-topbar-sub { display: none; }
}
</style>
</head>
<body onload="checkAuth()">

<!-- GLOBAL LOADER -->
<div id="globalLoader">
  <div></div>
</div>

<div class="wrapper">

  <!-- =============================================
       TOPBAR HEADER (baru)
       ============================================= -->
  <div class="app-topbar">
    <div class="app-topbar-left">
      <div class="app-topbar-logo">HS</div>
      <div class="app-topbar-info">
        <div class="app-topbar-title">Sistem Permohonan Pembelian Terus</div>
        <div class="app-topbar-sub">Hospital Sultan Zainal Abidin - UniSZA</div>
      </div>
    </div>
    <div class="app-topbar-right">
      <div class="app-topbar-date" id="topbarDate"></div>
      <button class="btn-theme" onclick="toggleTheme()">🌙</button>
    </div>
  </div>

  <!-- =============================================
       CONTENT AREA: SIDEBAR + MAIN
       ============================================= -->
  <div class="content-area">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="logo"></div>
      <div class="sidebar-label">Menu</div>

      <a href="dashboard.html" class="side-item">
        <span class="nav-icon">📊</span> Dashboard
      </a>
      <a href="asset-master.html" class="side-item active">
        <span class="nav-icon">📦</span> Assets
      </a>
      <a href="update-ppm.html" class="side-item">
        <span class="nav-icon">🔧</span> During Warranty
      </a>
      <a href="update-post.html" class="side-item">
        <span class="nav-icon">🛠️</span> Post Warranty
      </a>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">

      <!-- PAGE TOPBAR -->
      <div class="topbar">
        <div class="title">Assets</div>
        <div class="actions">
          <input id="searchBox" placeholder="Search...">
          <button class="btn btn-primary" onclick="openAddAsset()">+ Add Asset</button>
        </div>
      </div>

      <!-- TABLE -->
      <div class="table-box">
        <table id="assetTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>Asset No</th>
              <th>Location</th>
              <th>Equipment</th>
              <th>Type Code</th>
              <th>Discipline</th>
              <th>Start</th>
              <th>End</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
        <div id="pagination" style="margin-top:10px;display:flex;gap:6px;"></div>
      </div>

    </div>
  </div>
</div>

<!-- =============================================
     MODAL: ASSET DETAIL
     ============================================= -->
<div class="modal" id="globalDetailModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="detailTitle">Asset Detail</h3>
      <span class="close-btn">&times;</span>
    </div>
    <div id="detailBody"></div>
  </div>
</div>

<!-- =============================================
     MODAL: PPM UPDATE
     ============================================= -->
<div id="ppmModal" class="modal" style="display:none;">
  <div class="modal-content" style="max-width:400px;">
    <h3>Update PPM</h3>
    <div style="margin:10px 0;">
      <label>Actual Date</label>
      <input type="date" id="ppmActualDate" style="width:100%; padding:8px;">
    </div>
    <div style="display:flex; gap:10px; justify-content:flex-end;">
      <button class="btn" onclick="closePPMModal()">Cancel</button>
      <button class="btn btn-primary" onclick="savePPM()">Save</button>
    </div>
  </div>
</div>

<!-- =============================================
     SCRIPTS
     ============================================= -->
<script>
(function() {
  var t = new Date();
  var el = document.getElementById('topbarDate');
  if (el) {
    el.textContent = t.toLocaleDateString('ms-MY', {
      weekday: 'long',
      year: 'numeric',
      month: 'long',
      day: 'numeric'
    });
  }
})();
</script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/location.js"></script>
<script src="js/modal.js"></script>
<script src="js/asset.js"></script>
<script src="js/toggletheme"></script>
</body>
</html>
