<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="stylesheet" href="css/style.css">

</head>
<body onload="checkAuth()">
<div class="wrapper">

<div class="sidebar">
  <div class="fa-solid fa-cube"></div>
  <a href="dashboard.html" class="side-item ">Dashboard</a>
  <a href="asset-master.html" class="side-item ">Assets</a>
  <a href="preventive-maintenance.html" class="side-item ">PPM</a>
</div>

<div class="main">

<div class="topbar">
  <div class="title">Dashboard (<span id="moduleName"></span>)</div>
  <div>
  <button class="btn" onclick="exportCSV()" title="Export Excel">
    📊
  </button>
  <button class="btn logout-btn" onclick="logout()">
    Logout
  </button>
  User: <span id="userDisplay"></span>
</div>
</div>

<div class="kpi">
  <div class="card"><div>Total Assets</div><div class="value" id="totalAssets">0</div></div>
  <div class="card"><div>Overdue</div><div class="value" id="overdueCount">0</div></div>
  <div class="card"><div>Upcoming</div><div class="value" id="upcomingCount">0</div></div>
</div>

<!-- 🔥 FILTER + SEARCH -->
<div class="filter-bar">
  <input type="text" id="searchInput" placeholder="Search asset..." oninput="applyFilter()">
  <button onclick="setFilter('ALL')" id="f_all">All</button>
  <button onclick="setFilter('OVERDUE')" id="f_overdue">Expired</button>
  <button onclick="setFilter('NEAR')" id="f_near">Expiring Soon</button>
</div>

<div class="table-box">
  <div class="title">Duration Warranty</div>
  <table id="durationTable">
    <thead>
      <tr>
        <th>ID</th>
        <th>Equipment</th>
        <th>Start Date</th>
        <th>End Date</th>
        <th>Days Left</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

</div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
