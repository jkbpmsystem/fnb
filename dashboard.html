<!DOCTYPE html>
<html> 
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body onload="checkAuth()">
<div class="wrapper">

  <!-- TOPBAR HEADER -->
  <div class="app-topbar">
    <div class="app-topbar-left">
      <div class="app-topbar-logo">JKB</div>
      <div class="app-topbar-info">
        <div class="app-topbar-title">Monitoring Assets</div>
        <div class="app-topbar-sub">Hospital Sultan Zainal Abidin - UniSZA</div>
      </div>
    </div>
    <div class="app-topbar-right">
      <div class="app-topbar-date" id="topbarDate"></div>
      <span style="font-size:12px;opacity:.8;">User: <span id="userDisplay"></span></span>
      <button class="btn-theme" onclick="logout()">Logout</button>
    </div>
  </div>

  <!-- CONTENT AREA -->
  <div class="content-area">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-label">Menu</div>
      <a href="dashboard.html" class="side-item active">
        <span class="nav-icon">📊</span> Dashboard
      </a>
      <a href="asset-master.html" class="side-item">
        <span class="nav-icon">📦</span> Assets
      </a>
      <a href="update-ppm.html" class="side-item">
        <span class="nav-icon">🔧</span> During Warranty
      </a>
      <a href="update-post.html" class="side-item">
        <span class="nav-icon">🛠️</span> Post Warranty
      </a>
      <a href="import-tool.html" class="side-item">
        <span class="nav-icon">🛠️</span> Import Tool
      </a>
    </div>

    <!-- MAIN -->
    <div class="main">

      <div class="topbar">
        <div class="title">Dashboard (<span id="moduleName"></span>)</div>
      </div>

      <div class="kpi">
        <div class="card"><div>Total Assets</div><div class="value" id="totalAssets">0</div></div>
        <div class="card"><div>Overdue</div><div class="value" id="overdueCount">0</div></div>
        <div class="card"><div>Upcoming</div><div class="value" id="upcomingCount">0</div></div>
      </div>

      <!-- FILTER + SEARCH -->
      <div class="filter-bar">
        <input type="text" id="searchInput" placeholder="Search asset..." oninput="applyFilter()">
        <button onclick="setFilter('ALL')" id="f_all">All</button>
        <button onclick="setFilter('OVERDUE')" id="f_overdue">Expired</button>
        <button onclick="setFilter('NEAR')" id="f_near">Expiring Soon</button>
        <button class="btn-theme" onclick="exportCSV()" title="Export Excel">📊</button>
      </div>

      <div class="table-box">
        <div class="title">Duration Warranty</div>
        <table id="durationTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>Equipment</th>
              <th>Start Date</th>
              <th>End Date</th>
              <th>Days Left</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
        <div id="pagination"></div>
      </div>

    </div>
  </div>
</div>

<script>
(function(){
  var t=new Date();
  var el=document.getElementById('topbarDate');
  if(el) el.textContent=t.toLocaleDateString('ms-MY',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
})();
</script>
<script src="js/firebase-config.local.js"></script>
<script src="js/firebase-init.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
