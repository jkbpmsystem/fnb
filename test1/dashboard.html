<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="stylesheet" href="components/loading.css">
<link rel="stylesheet" href="components/db.css">
<link rel="icon" type="image/png" href="img/cube.png">

<!-- FONT AWESOME -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<script src="components/loading.js"></script> 
<script src="components/db.js"></script> 

</head>

<body>

<div id="loadingScreen">

  <div class="loader-box">

    <div class="cube">
      <i class="fa-solid fa-cube"></i>
    </div>

    <div class="loading-text">
      Loading ...
    </div>

    <div class="loading-bar">
      <div class="bar"></div>
    </div>

  </div>

</div>
  
<div class="wrapper">

  <!-- Sidebar -->
<div class="sidebar" id="sidebar">
  <div class="logo"><i class="fa-solid fa-cube"></i></div>

<a href="dashboard.html" class="side-item">
  <i class="fa-solid fa-house"></i>
  <span>Dashboard</span>
</a>

  <a href="asset-master.html" class="side-item">
    <i class="fa-solid fa-box"></i>
    <span>Assets</span>
  </a>

  <a href="warranty.html" class="side-item">
    <i class="fa-solid fa-shield-halved"></i>
    <span>Warranty</span>
  </a>

  <a href="preventive-maintenance.html" class="side-item">
    <i class="fa-solid fa-calendar-days"></i>
    <span>PPM</span>
  </a>

  <a href="statutory.html" class="side-item">
    <i class="fa-solid fa-clipboard-list"></i>
    <span>Statutory</span>
  </a>
</div>
  
  <!-- Main -->
  <div class="main">

    <div class="topbar">
      <div class="title">Dashboard PM</div>
      <div class="profile">
      <span id="userDisplay"></span>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </div>

    <!-- KPI -->
    <div class="kpi-grid">
      <div class="card">
        <i class="fa-solid fa-building cyan"></i>
        <div class="card-title">Total Assets</div>
        <div class="card-value cyan" id="totalAssets">0</div>
      </div>

      <div class="card">
        <i class="fa-solid fa-clipboard-list yellow"></i>
        <div class="card-title">Statutory</div>
        <div class="card-value yellow">0</div>
      </div>

      <div class="card">
        <i class="fa-solid fa-triangle-exclamation red"></i>
        <div class="card-title">Overdue</div>
        <div class="card-value red" id="overdueCount">0</div>
      </div>

      <div class="card">
        <i class="fa-solid fa-calendar-check yellow"></i>
        <div class="card-title">Upcoming PM</div>
        <div class="card-value yellow" id="upcomingCount">0</div>
      </div>

      <div class="card">
  <i class="fa-solid fa-circle-check green"></i>
  <div class="card-title">Completed</div>
  <div class="card-value green" id="completedCount">0</div>
</div>
      
    </div>

    <!-- Charts -->
    <div class="chart-grid">
      <div class="chart-box">
        <div class="chart-title">PM Trend</div>
        <canvas></canvas>
      </div>

      <div class="chart-box">
        <div class="chart-title"></div>
        <canvas></canvas>
      </div>
  </div>

    <!-- Table -->
<div class="table-box">

<div class="chart-title">Upcoming PPM</div>

<table>
<thead>
<tr>
<th>ID</th>
<th>Equipment Name</th>
<th>Date</th>
<th>Status</th>
</tr>
</thead>

<tbody id="upcomingTable"></tbody>
</table>

<br>

<div class="chart-title">Overdue PM</div>

<table>
<thead>
<tr>
<th>ID</th>
<th>Equipment Name</th>
<th>Date</th>
<th>Status</th>
</tr>
</thead>

<tbody id="overdueTable"></tbody>
</table>

</div>

  </div>
</div>



</body>

</html>
